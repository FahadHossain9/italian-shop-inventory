  <rect x="0" y="580" width="560" height="50" fill="#7A6B5A" opacity="0.6"/>

  <!-- Crates in foreground -->
  <rect x="30"  y="548" width="80" height="36" rx="2" fill="#8B6B3A" opacity="0.9"/>
  <circle cx="50"  cy="542" r="10" fill="#FF7B35"/>
  <circle cx="66"  cy="542" r="10" fill="#FF9040"/>
  <circle cx="82"  cy="542" r="10" fill="#FF7B35"/>
  <circle cx="97"  cy="542" r="9"  fill="#FF5050"/>
  <rect x="118" y="554" width="65" height="30" rx="2" fill="#8B6B3A" opacity="0.9"/>
  <circle cx="132" cy="548" r="8" fill="#E83A2A"/>
  <circle cx="148" cy="548" r="8" fill="#E83A2A"/>
  <circle cx="164" cy="548" r="8" fill="#E83A2A"/>
  <circle cx="178" cy="548" r="8" fill="#FFD700"/>

