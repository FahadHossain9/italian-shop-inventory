<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0D0C09"/>
      <stop offset="100%" stop-color="#141008"/>
    </linearGradient>
    <!-- Gold text gradient -->
    <linearGradient id="og-gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#b8862f"/>
      <stop offset="40%"  stop-color="#f0c84a"/>
      <stop offset="100%" stop-color="#d4a437"/>
    </linearGradient>
    <!-- Radial glow -->
    <radialGradient id="og-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#d4a437" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d4a437" stop-opacity="0"/>
    </radialGradient>
    <!-- Sky gradient for facade -->
    <linearGradient id="og-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C8E0F0"/>
      <stop offset="100%" stop-color="#EAD8C0"/>
    </linearGradient>
    <!-- Awning clip -->
    <clipPath id="og-awn">
      <polygon points="115,235 485,235 510,280 90,280"/>
    </clipPath>
  </defs>

  <!-- Main background -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>

  <!-- Subtle dot-grid overlay -->
  <pattern id="og-grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#d4a437" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#og-grid)"/>

  <!-- Gold radial glow centered -->
  <ellipse cx="600" cy="315" rx="480" ry="280" fill="url(#og-glow)"/>

  <!-- ─────────── LEFT SIDE: Italian shop facade (x 0–560) ─────────────────── -->

  <!-- Sky background for scene -->
  <rect x="0" y="0" width="560" height="630" fill="url(#og-sky)" opacity="0.15"/>

  <!-- Left flanking building -->
  <rect x="20"  y="140" width="115" height="490" fill="#CC8B5A" opacity="0.85"/>
  <rect x="20"  y="130" width="115" height="16"  fill="#B87B4A" opacity="0.85"/>
  <!-- Left building windows -->
  <rect x="32"  y="165" width="28" height="40" rx="2" fill="#A8CDD8" opacity="0.5"/>
  <rect x="68"  y="165" width="28" height="40" rx="2" fill="#A8CDD8" opacity="0.5"/>
  <rect x="32"  y="225" width="28" height="40" rx="2" fill="#A8CDD8" opacity="0.4"/>
  <rect x="68"  y="225" width="28" height="40" rx="2" fill="#A8CDD8" opacity="0.4"/>
  <!-- Left shutters -->
  <rect x="32"  y="195" width="14" height="10" fill="#2D5A3D" opacity="0.7"/>
  <rect x="46"  y="195" width="14" height="10" fill="#2D5A3D" opacity="0.7"/>
  <rect x="68"  y="195" width="14" height="10" fill="#2D5A3D" opacity="0.7"/>
  <rect x="82"  y="195" width="14" height="10" fill="#2D5A3D" opacity="0.7"/>

  <!-- Right flanking building -->
  <rect x="425" y="120" width="115" height="510" fill="#D4A455" opacity="0.85"/>
  <rect x="425" y="110" width="115" height="16"  fill="#C09040" opacity="0.85"/>
  <rect x="435" y="148" width="28" height="40" rx="2" fill="#A8CDD8" opacity="0.5"/>
  <rect x="472" y="148" width="28" height="40" rx="2" fill="#A8CDD8" opacity="0.5"/>
  <rect x="435" y="210" width="28" height="40" rx="2" fill="#A8CDD8" opacity="0.4"/>
  <rect x="472" y="210" width="28" height="40" rx="2" fill="#A8CDD8" opacity="0.4"/>
  <rect x="435" y="272" width="28" height="40" rx="2" fill="#A8CDD8" opacity="0.35"/>
  <rect x="472" y="272" width="28" height="40" rx="2" fill="#A8CDD8" opacity="0.35"/>

