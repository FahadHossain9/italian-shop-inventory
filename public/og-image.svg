  <path d="M20,140 Q280,120 540,110" stroke="#d4a437" stroke-width="1.2" fill="none" opacity="0.5"/>
  <circle cx="50"  cy="133" r="4.5" fill="#F5D870" opacity="0.8"/>
  <circle cx="110" cy="128" r="4.5" fill="#F5D870" opacity="0.8"/>
  <circle cx="175" cy="124" r="4.5" fill="#F5D870" opacity="0.8"/>
  <circle cx="240" cy="122" r="4.5" fill="#F5D870" opacity="0.8"/>
  <circle cx="305" cy="120" r="4.5" fill="#F5D870" opacity="0.8"/>
  <circle cx="370" cy="118" r="4.5" fill="#F5D870" opacity="0.8"/>
  <circle cx="435" cy="116" r="4.5" fill="#F5D870" opacity="0.8"/>
  <circle cx="500" cy="113" r="4.5" fill="#F5D870" opacity="0.8"/>

  <!-- Hanging garlic -->
  <line x1="190" y1="280" x2="190" y2="302" stroke="#8B7B5A" stroke-width="1.5"/>
  <ellipse cx="185" cy="305" rx="6" ry="7" fill="#F5EDD8" stroke="#C8B8A0" stroke-width="1"/>
  <ellipse cx="195" cy="308" rx="5" ry="6" fill="#F5EDD8" stroke="#C8B8A0" stroke-width="1"/>
  <!-- Hanging salami -->
