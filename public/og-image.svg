  <line x1="580" y1="60" x2="580" y2="570" stroke="#d4a437" stroke-width="1" opacity="0.2"/>

  <!-- ─────────── RIGHT SIDE: Brand copy (x 620–1160) ──────────────────────── -->

  <!-- Logo mark -->
  <rect x="640" y="90" width="52" height="52" fill="#d4a437"/>
  <!-- Box icon inside logo -->
  <rect x="651" y="113" width="30" height="20" rx="2" fill="#1a1a1a"/>
  <path d="M651 113 L666 106 L681 113" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="666" y1="106" x2="666" y2="113" stroke="#d4a437" stroke-width="1.2" opacity="0.5"/>
  <line x1="651" y1="119" x2="681" y2="119" stroke="#d4a437" stroke-width="1" opacity="0.35"/>
  <circle cx="666" cy="119" r="2" fill="#d4a437" opacity="0.6"/>

  <!-- App name -->
  <text x="706" y="121" fill="#F5F0E8" font-size="28" font-family="Georgia,serif" font-weight="500" letter-spacing="1">Al Bazar</text>
  <text x="706" y="138" fill="#6B5B4A" font-size="11" font-family="monospace" letter-spacing="3">SHOP MANAGER</text>

  <!-- Divider -->
  <line x1="640" y1="168" x2="1140" y2="168" stroke="#d4a437" stroke-width="1" opacity="0.25"/>

  <!-- Main headline -->
  <text x="640" y="235" font-size="58" font-family="Georgia,serif" font-weight="400" fill="url(#og-gold)" letter-spacing="-1">Gestisci il tuo</text>
  <text x="640" y="302" font-size="58" font-family="Georgia,serif" font-weight="400" fill="url(#og-gold)" letter-spacing="-1">negozio con</text>
  <text x="640" y="369" font-size="58" font-family="Georgia,serif" font-weight="400" fill="#F5F0E8"  letter-spacing="-1">eleganza.</text>

  <!-- Tagline -->
  <text x="640" y="415" fill="#6B5B4A" font-size="18" font-family="sans-serif" font-weight="400">Inventario · Vendite · Corrispettivi · Fornitori</text>

  <!-- Feature pills -->
  <rect x="640" y="440" width="130" height="32" rx="2" fill="#161410" stroke="#2A2520" stroke-width="1"/>
  <text x="705" y="461" fill="#d4a437" font-size="11" text-anchor="middle" font-family="monospace" letter-spacing="1">IVA 4·10·22%</text>

  <rect x="782" y="440" width="118" height="32" rx="2" fill="#161410" stroke="#2A2520" stroke-width="1"/>
  <text x="841" y="461" fill="#d4a437" font-size="11" text-anchor="middle" font-family="monospace" letter-spacing="1">CORRISPETTIVI</text>

  <rect x="912" y="440" width="100" height="32" rx="2" fill="#161410" stroke="#2A2520" stroke-width="1"/>
  <text x="962" y="461" fill="#d4a437" font-size="11" text-anchor="middle" font-family="monospace" letter-spacing="1">SATISPAY</text>

  <rect x="1024" y="440" width="116" height="32" rx="2" fill="#161410" stroke="#2A2520" stroke-width="1"/>
  <text x="1082" y="461" fill="#d4a437" font-size="11" text-anchor="middle" font-family="monospace" letter-spacing="1">IT · EN · 🌐</text>

  <!-- Divider bottom -->
  <line x1="640" y1="500" x2="1140" y2="500" stroke="#d4a437" stroke-width="1" opacity="0.2"/>

  <!-- Location + URL -->
  <circle cx="652" cy="526" r="4" fill="#d4a437" opacity="0.6"/>
  <text x="664" y="531" fill="#4A3A2A" font-size="14" font-family="monospace" letter-spacing="1">Via Padova 104 · Milano · Italia</text>

  <text x="1140" y="531" fill="#3A3020" font-size="13" font-family="monospace" text-anchor="end" letter-spacing="1">albazar.shop</text>

  <!-- Outer border frame -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#d4a437" stroke-width="1.5" opacity="0.15"/>
  <!-- Corner accents -->
  <path d="M1,1 L40,1 M1,1 L1,40"   stroke="#d4a437" stroke-width="2" opacity="0.5"/>
  <path d="M1199,1 L1160,1 M1199,1 L1199,40"   stroke="#d4a437" stroke-width="2" opacity="0.5"/>
  <path d="M1,629 L40,629 M1,629 L1,589"  stroke="#d4a437" stroke-width="2" opacity="0.5"/>
  <path d="M1199,629 L1160,629 M1199,629 L1199,589" stroke="#d4a437" stroke-width="2" opacity="0.5"/>
</svg>
