  <text x="270" y="181" fill="#d4a437" font-size="22" font-family="Georgia,serif" text-anchor="middle" font-weight="bold" letter-spacing="6">AL BAZAR</text>
  <text x="270" y="194" fill="#8B7B60" font-size="9" text-anchor="middle" font-family="monospace" letter-spacing="2">VIA PADOVA 104 · MILANO</text>

