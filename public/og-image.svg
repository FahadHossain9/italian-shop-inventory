    <rect x="138" y="232" width="22" height="52" fill="#F5EDD8" opacity="0.22"/>
    <rect x="183" y="232" width="22" height="52" fill="#F5EDD8" opacity="0.22"/>
    <rect x="228" y="232" width="22" height="52" fill="#F5EDD8" opacity="0.22"/>
    <rect x="273" y="232" width="22" height="52" fill="#F5EDD8" opacity="0.22"/>
    <rect x="318" y="232" width="22" height="52" fill="#F5EDD8" opacity="0.22"/>
    <rect x="363" y="232" width="22" height="52" fill="#F5EDD8" opacity="0.22"/>
    <rect x="408" y="232" width="22" height="52" fill="#F5EDD8" opacity="0.22"/>
    <rect x="453" y="232" width="22" height="52" fill="#F5EDD8" opacity="0.22"/>
