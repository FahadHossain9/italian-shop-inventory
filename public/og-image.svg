  <!-- Scalloped valance -->
  <path d="M90,280 Q107,300 124,280 Q141,300 158,280 Q175,300 192,280 Q209,300 226,280 Q243,300 260,280 Q277,300 294,280 Q311,300 328,280 Q345,300 362,280 Q379,300 396,280 Q413,300 430,280 Q447,300 464,280 Q481,300 498,280 Q515,300 510,280" fill="#1B4332"/>

  <!-- Shop window (left panel) -->
  <rect x="137" y="295" width="150" height="140" fill="#D4EEF8" opacity="0.75"/>
  <rect x="137" y="295" width="150" height="140" fill="none" stroke="#C8B898" stroke-width="2.5"/>
  <line x1="212" y1="295" x2="212" y2="435" stroke="#C8B898" stroke-width="2"/>
  <line x1="137" y1="368" x2="287" y2="368" stroke="#C8B898" stroke-width="2"/>
  <!-- Products in window -->
  <rect x="148" y="307" width="14" height="48" rx="7" fill="#D4B44A" opacity="0.88"/>
  <rect x="168" y="312" width="30" height="40" rx="4" fill="#E8D4A8" opacity="0.85"/>
  <rect x="220" y="308" width="20" height="48" rx="2" fill="#F5C842" opacity="0.85"/>
  <rect x="245" y="312" width="24" height="42" rx="3" fill="#E85A3A" opacity="0.78"/>
