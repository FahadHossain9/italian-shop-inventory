  <circle cx="150" cy="405" r="12" fill="#FF7B35" opacity="0.88"/>
  <circle cx="175" cy="408" r="11" fill="#FF5050" opacity="0.88"/>
  <circle cx="198" cy="406" r="12" fill="#FFD700" opacity="0.88"/>
  <circle cx="222" cy="408" r="11" fill="#78C850" opacity="0.88"/>
  <circle cx="245" cy="406" r="12" fill="#FF7B35" opacity="0.88"/>
  <circle cx="268" cy="408" r="10" fill="#E83A2A" opacity="0.88"/>

