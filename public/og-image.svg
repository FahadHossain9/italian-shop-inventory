  <rect x="312" y="365" width="22" height="38" rx="2" fill="#5A4030"/>
  <rect x="340" y="365" width="22" height="38" rx="2" fill="#5A4030"/>
  <rect x="312" y="412" width="22" height="34" rx="2" fill="#5A4030"/>
