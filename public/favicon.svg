<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Gold background -->
  <rect width="32" height="32" fill="#d4a437"/>

  <!-- Box body -->
  <rect x="6" y="15" width="20" height="12" rx="1.5" fill="#1a1a1a"/>

  <!-- Box lid top face (trapezoid) -->
  <path d="M6 15 L16 10 L26 15 Z" fill="#2e2e2e"/>

  <!-- Box lid outline -->
  <path d="M6 15 L16 10 L26 15" fill="none" stroke="#d4a437" stroke-width="1" opacity="0.5"/>

  <!-- Center vertical crease on lid -->
  <line x1="16" y1="10" x2="16" y2="15" stroke="#d4a437" stroke-width="1" opacity="0.4"/>

  <!-- Horizontal band across box body -->
  <line x1="6" y1="20" x2="26" y2="20" stroke="#d4a437" stroke-width="1" opacity="0.35"/>

  <!-- Clasp dot -->
  <circle cx="16" cy="20" r="1.5" fill="#d4a437" opacity="0.7"/>
</svg>
